<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fact or Stigma? — HLTH 207 Behavioral Health</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#1a1a2e;color:#1a1a1a;min-height:100vh}
.skip-link{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;padding:10px 16px;background:#4A235A;color:white;border-radius:8px;font-size:15px;font-weight:700;z-index:9999;text-decoration:none}
.screen{display:none;min-height:100vh;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Title screen */
.title-screen{background:linear-gradient(160deg,#4A235A 0%,#1a1a2e 100%);padding:48px 24px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.title-screen h1{font-size:clamp(28px,6vw,48px);font-weight:900;color:white;margin-bottom:12px;line-height:1.2}
.subtitle{font-size:18px;color:rgba(255,255,255,.75);margin-bottom:10px}
.course-tag{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:40px}
.start-btn{background:#9B59B6;color:white;border:none;padding:18px 40px;border-radius:14px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s}
.start-btn:active{transform:scale(.97)}
.start-btn:focus-visible{outline:3px solid white;outline-offset:3px}
.tip{margin-top:20px;font-size:14px;color:rgba(255,255,255,.5);max-width:380px;line-height:1.6}

/* Question screen */
.q-screen{min-height:100vh;display:flex;flex-direction:column}
.q-header{background:#4A235A;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.q-counter{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.05em}
.q-score-display{font-size:13px;font-weight:700;color:#E8D5F5}
.progress-bar{height:5px;background:rgba(255,255,255,.15)}
.progress-fill{height:100%;background:#9B59B6;transition:width .3s ease}
.q-body{flex:1;background:white;padding:24px 20px}
.q-number{font-size:12px;font-weight:700;color:#9B59B6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.q-statement{font-size:clamp(17px,4vw,22px);font-weight:700;line-height:1.5;color:#1a1a1a;margin-bottom:32px}
.vote-row{display:flex;gap:12px;margin-bottom:20px}
.vote-btn{flex:1;padding:18px 10px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .1s}
.vote-btn:active{transform:scale(.97)}
.vote-btn:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
.btn-fact{background:#155724;color:white}
.btn-stigma{background:#7A1515;color:white}
.vote-btn:disabled{cursor:default;opacity:.6}

/* Reveal */
.reveal-box{border-radius:12px;padding:16px 18px;margin-bottom:16px;border:2px solid}
.reveal-fact{background:#E8F5E9;border-color:#155724}
.reveal-stigma{background:#FDEAEA;border-color:#7A1515}
.reveal-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.reveal-label.fact{color:#155724}
.reveal-label.stigma{color:#7A1515}
.reveal-text{font-size:16px;line-height:1.65;color:#1a1a1a}
.reveal-stat{background:#EEE8F8;border-left:4px solid #4A235A;padding:12px 14px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.6;color:#1a1a1a;margin-bottom:16px}
.advocacy-note{background:#E8F0FE;border-left:4px solid #1849A9;padding:12px 14px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;color:#1a1a1a;margin-bottom:20px}
.next-btn{width:100%;padding:16px;background:#4A235A;color:white;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit}
.next-btn:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}

/* Score screen */
.score-screen{background:linear-gradient(160deg,#4A235A 0%,#1a1a2e 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.score-screen h2{font-size:32px;font-weight:900;color:white;margin-bottom:8px}
.score-screen .score-big{font-size:64px;font-weight:900;color:#E8D5F5;margin:16px 0}
.score-screen p{font-size:17px;color:rgba(255,255,255,.8);margin-bottom:28px;line-height:1.6;max-width:400px}
.replay-btn{background:white;color:#4A235A;border:none;padding:16px 36px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div role="status" aria-live="polite" aria-atomic="true" id="live-msg" style="position:absolute;left:-9999px;height:1px;width:1px;overflow:hidden"></div>

<!-- TITLE -->
<main id="s-title" class="screen active title-screen" aria-labelledby="game-title">
  <a id="main-content" tabindex="-1" aria-hidden="true" style="display:block;height:0"></a>
  <div style="font-size:56px;margin-bottom:20px" aria-hidden="true">🧠</div>
  <h1 id="game-title">Fact or Stigma?</h1>
  <p class="subtitle">Behavioral Health Edition</p>
  <p class="course-tag">HLTH 207 · Chapter 9 · Towson University</p>
  <button class="start-btn" onclick="startGame()" aria-label="Start the Fact or Stigma game">Let's Play →</button>
  <p class="tip">Read each statement. Vote Fact or Stigma. See the real data — then discuss.</p>
</main>

<!-- QUESTION -->
<main id="s-question" class="screen q-screen" aria-labelledby="q-statement">
  <div class="q-header">
    <span class="q-counter" id="q-counter" aria-live="polite"></span>
    <span class="q-score-display" id="q-score-display"></span>
  </div>
  <div class="progress-bar" role="progressbar" id="prog-bar" aria-label="Game progress">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="q-body">
    <div class="q-number" id="q-number" aria-hidden="true"></div>
    <div class="q-statement" id="q-statement"></div>
    <div class="vote-row" role="group" aria-label="Vote: Fact or Stigma?">
      <button class="vote-btn btn-fact" id="btn-fact" onclick="vote('fact')" aria-label="Vote: This is a Fact">✓ Fact</button>
      <button class="vote-btn btn-stigma" id="btn-stigma" onclick="vote('stigma')" aria-label="Vote: This is Stigma">✗ Stigma</button>
    </div>
    <p style="font-size:13px;color:#888;text-align:center">Everyone votes at the same time — discuss after the reveal.</p>
  </div>
</main>

<!-- REVEAL -->
<main id="s-reveal" class="screen" aria-labelledby="reveal-heading">
  <div style="background:#4A235A;padding:14px 20px">
    <h2 id="reveal-heading" style="font-size:15px;font-weight:700;color:white">The Reveal</h2>
  </div>
  <div style="padding:20px;background:white;min-height:calc(100vh - 50px)">
    <div class="reveal-box" id="reveal-box">
      <div class="reveal-label" id="reveal-label"></div>
      <div class="reveal-text" id="reveal-text"></div>
    </div>
    <div class="reveal-stat" id="reveal-stat" role="note" aria-label="Data and evidence"></div>
    <div class="advocacy-note" id="advocacy-note" role="note" aria-label="Advocacy connection"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Statement →</button>
  </div>
</main>

<!-- SCORE -->
<main id="s-score" class="screen score-screen" aria-labelledby="score-heading">
  <div style="font-size:52px;margin-bottom:12px" aria-hidden="true">🎯</div>
  <h2 id="score-heading">Game Complete!</h2>
  <div class="score-big" id="final-score" aria-live="polite"></div>
  <p id="score-msg"></p>
  <button class="replay-btn" onclick="restartGame()">Play Again</button>
</main>

<script>
const QUESTIONS = [
  {
    statement: "People with mental illness are more dangerous and violent than people without mental illness.",
    answer: "stigma",
    reveal: "This is stigma-driven misinformation. Research consistently shows that people with mental illness are far more likely to be victims of violence than perpetrators. The vast majority of violent acts are committed by people without mental illness.",
    stat: "People with serious mental illness are 10 times more likely to be victims of violent crime than the general population. Only 3–5% of violent acts in the U.S. are attributable to individuals with serious mental illness (NIMH, 2024).",
    advocacy: "Stigma is one of the top barriers to care identified in Chapter 9. Students advocating on mental health issues should address stigma reduction as a policy goal — it directly affects treatment-seeking behavior."
  },
  {
    statement: "In 2024, approximately 62 million U.S. adults — nearly 1 in 4 — experienced a mental illness.",
    answer: "fact",
    reveal: "This is a fact from SAMHSA's 2024 National Survey on Drug Use and Health. Mental illness is the most common health condition in the United States, yet it receives a fraction of the research and funding that physical illness does.",
    stat: "In 2024, 23.4% of U.S. adults — 62 million people — experienced any mental illness. For comparison, approximately 20 million Americans have diabetes and 6 million have heart failure (SAMHSA, 2025).",
    advocacy: "The sheer prevalence of behavioral health conditions makes this one of the most urgent public health issues of our time. Any student's advocacy topic — from maternal health to veterans to opioids — intersects with mental health."
  },
  {
    statement: "If people with mental illness just tried harder and had more willpower, they could get better without professional help.",
    answer: "stigma",
    reveal: "This is stigma. Mental illnesses are medical conditions involving brain chemistry, genetics, trauma, and environment. Telling someone to 'just try harder' is equivalent to telling a diabetic to 'just will their pancreas to work.' Evidence-based treatments exist and are effective.",
    stat: "Depression, anxiety, PTSD, and schizophrenia all have neurobiological components and respond to evidence-based treatments including therapy, medication, and peer support. Recovery rates for treated mental illness are comparable to treated heart disease (APA, 2024).",
    advocacy: "This stigma belief is a primary reason people delay or avoid treatment. Chapter 9 identifies stigma as a structural barrier to care — not just a personal attitude. Policy can address this through education, media campaigns, and anti-discrimination laws."
  },
  {
    statement: "Nearly half of all Americans with mental illness received no treatment in 2024.",
    answer: "fact",
    reveal: "This is a staggering fact. Despite the existence of effective treatments, the treatment gap in behavioral health is enormous — driven by stigma, workforce shortages, cost, lack of insurance coverage, and geographic barriers.",
    stat: "48% of the 62 million U.S. adults with mental illness received NO treatment in 2024. The national average wait time for behavioral health services is 48 days — and 6 in 10 psychologists do not accept new patients (SAMHSA 2025; HRSA 2025).",
    advocacy: "This treatment gap is exactly what parity laws, Medicaid expansion, and the ACA were designed to address. Students advocating for any health issue should understand how mental health access barriers intersect with their population."
  },
  {
    statement: "Mental health conditions are rare and only affect a small portion of the U.S. population.",
    answer: "stigma",
    reveal: "This is stigma-driven myth. Mental illness is extraordinarily common. The idea that it affects only a 'small' or 'other' population leads to underinvestment in care, reduced empathy, and continued discrimination.",
    stat: "In 2024: 23.4% of adults had any mental illness, 5.6% had serious mental illness, 32.2% of adults ages 18–25 had a mental illness, and 12.6% of young adults had serious thoughts of suicide. Neuropsychiatric disorders are the leading cause of disability in the U.S., surpassing heart disease and cancer (NAMI, 2025).",
    advocacy: "Students advocating on youth health, college health, opioids, or maternal health are directly addressing populations with the highest rates of mental illness. Behavioral health is embedded in virtually every health advocacy topic."
  },
  {
    statement: "Deinstitutionalization in the 1960s and 70s successfully moved people with mental illness into well-supported community care.",
    answer: "stigma",
    reveal: "This is a common misunderstanding of history. Deinstitutionalization discharged hundreds of thousands of people from psychiatric hospitals — but the promised community-based care was never adequately funded. The result was widespread homelessness and incarceration.",
    stat: "From its peak of over 500,000 in the mid-1950s, the inpatient psychiatric population fell to approximately 72,000 by 1994. But community mental health centers were chronically underfunded. Today, 67% of unhoused people in the U.S. have a mental illness, and 64% of jail inmates meet criteria for mental illness at time of booking (NAMI 2025; Chapter 9).",
    advocacy: "This history is directly relevant to housing, criminal justice, and veteran health advocacy topics. The failure of deinstitutionalization is a cautionary tale about policy without adequate funding and infrastructure."
  },
  {
    statement: "Jails and prisons have effectively become the largest mental health 'system' in the United States.",
    answer: "fact",
    reveal: "Sadly, this is true. As community mental health resources shrank and deinstitutionalization moved forward without adequate funding, the criminal justice system absorbed the population that psychiatric hospitals once served.",
    stat: "64% of jail inmates meet criteria for mental illness at time of booking. 69% of jail inmates have problems related to drugs, alcohol, or both. The American Psychiatric Association has noted that incarcerated individuals now have more severe mental illness than in the past (Chapter 9, Sultz & Young).",
    advocacy: "Students advocating on criminal justice reform, substance use, or housing policy are directly engaging with behavioral health. The pipeline from untreated mental illness to incarceration is a policy failure with a policy solution."
  },
  {
    statement: "Veterans have lower rates of mental illness than the general U.S. population due to military discipline and resilience training.",
    answer: "stigma",
    reveal: "This is stigma — and a dangerous one, because it discourages veterans from seeking help. Military service is associated with significantly elevated rates of PTSD, depression, anxiety, and substance use disorder compared to civilians.",
    stat: "17.6% of U.S. veterans experienced a mental illness in 2023 — 3.5 million people. Rates of PTSD and suicide are significantly elevated among veterans. The VHA operates one of the largest behavioral health systems in the country specifically because of this elevated need (NAMI, 2025).",
    advocacy: "Students with veteran health as their advocacy topic should understand that mental health is inseparable from veteran health outcomes. PTSD, moral injury, and substance use are not signs of weakness — they are predictable responses to combat and trauma exposure."
  },
  {
    statement: "Mental health parity laws require insurance companies to cover mental health treatment the same way they cover physical health treatment.",
    answer: "fact",
    reveal: "This is a fact — though enforcement has been inconsistent. The Wellstone-Domenici Mental Health Parity and Addiction Equity Act of 2008 requires that insurance coverage limits for mental health and substance use disorders be no more restrictive than those for medical and surgical care.",
    stat: "Despite the 2008 parity law, many insurers still use 'nonquantitative treatment limitations' (NQTLs) — prior authorization requirements, step therapy protocols, and network design — that effectively restrict behavioral health access more than medical access. Compliance and enforcement remain major challenges (Chapter 9).",
    advocacy: "Parity is a key policy lever for behavioral health access. Students advocating on mental health access, opioid treatment, or eating disorders should understand how parity law works — and where it fails — as the foundation of their policy argument."
  },
  {
    statement: "The United States has enough behavioral health providers to meet current demand for mental health services.",
    answer: "stigma",
    reveal: "This is dramatically false — the behavioral health workforce shortage is one of the most acute crises in American healthcare. More than one-third of the U.S. population currently lives in areas designated as mental health professional shortage areas.",
    stat: "The U.S. faces a projected 49% increase in demand for mental health services by 2033, while the workforce supply is expected to grow only 11%. Shortages of 88,000 mental health counselors and 114,000 addiction counselors are projected by 2037. Over one-third of the U.S. population lacks adequate access to mental health professionals (HRSA, 2025).",
    advocacy: "Workforce shortage is the most concrete barrier to behavioral health access in the United States. Students advocating for mental health access, rural health, or underserved populations need to understand that parity law is meaningless if there are no providers to see."
  },
  {
    statement: "Young adults ages 18–25 have significantly higher rates of mental illness than older adults.",
    answer: "fact",
    reveal: "This is a striking and important fact. Young adulthood is the highest-risk period for the onset of mental illness — and also the age group least likely to receive treatment. Understanding this is critical for any health policy advocate.",
    stat: "In 2024, 32.2% of U.S. adults ages 18–25 experienced mental illness — the highest rate of any age group. 12.6% of young adults had serious thoughts of suicide. Young adults ages 18–29 also had the highest rate of mental health crises at 15.1% in 2025 (NAMI 2025; Johns Hopkins, 2025).",
    advocacy: "College-age students are in the highest-risk demographic for mental illness onset. Students advocating on college health, opioids, maternal health (for young mothers), or food insecurity are directly addressing a population disproportionately affected by behavioral health conditions."
  },
  {
    statement: "Mental illness is a personal weakness or character flaw, not a medical condition.",
    answer: "stigma",
    reveal: "This is perhaps the most pervasive and damaging stigma in behavioral health. Mental illnesses have neurobiological, genetic, environmental, and social causes — they are medical conditions, not moral failures. This belief is the primary reason people avoid seeking help.",
    stat: "The DSM-5 identifies more than 300 classified mental health conditions with diagnostic criteria subjected to field testing for reliability and validity. Major depression involves measurable changes in brain structure and function. PTSD causes lasting neurological changes. These are medical realities, not character flaws (APA 2022; Chapter 9).",
    advocacy: "Reducing stigma is a policy issue. Anti-stigma campaigns, training programs for schools and workplaces, and media literacy education are all evidence-based policy interventions. This is the foundation of any behavioral health advocacy argument."
  },
];

let current = 0;
let score = 0;
let voted = false;

function announce(msg) {
  const el = document.getElementById('live-msg');
  el.textContent = '';
  setTimeout(() => { el.textContent = msg; }, 60);
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  setTimeout(() => {
    const h = document.getElementById(id).querySelector('h1,h2,[tabindex="-1"]');
    if (h) { h.setAttribute('tabindex', '-1'); h.focus(); }
  }, 120);
}

function startGame() {
  current = 0; score = 0; voted = false;
  loadQuestion();
  go('s-question');
}

function loadQuestion() {
  const q = QUESTIONS[current];
  voted = false;
  document.getElementById('q-counter').textContent = 'Question ' + (current + 1) + ' of ' + QUESTIONS.length;
  document.getElementById('q-score-display').textContent = 'Score: ' + score + ' / ' + current;
  document.getElementById('q-number').textContent = 'Statement ' + (current + 1);
  document.getElementById('q-statement').textContent = q.statement;
  document.getElementById('prog-fill').style.width = (current / QUESTIONS.length * 100) + '%';
  document.getElementById('prog-bar').setAttribute('aria-valuenow', current + 1);
  document.getElementById('prog-bar').setAttribute('aria-valuemax', QUESTIONS.length);
  document.getElementById('prog-bar').setAttribute('aria-valuetext', 'Question ' + (current + 1) + ' of ' + QUESTIONS.length);
  document.getElementById('btn-fact').disabled = false;
  document.getElementById('btn-stigma').disabled = false;
  announce('Statement ' + (current + 1) + ' of ' + QUESTIONS.length + ': ' + q.statement);
}

function vote(choice) {
  if (voted) return;
  voted = true;
  const q = QUESTIONS[current];
  const correct = choice === q.answer;
  if (correct) score++;
  document.getElementById('btn-fact').disabled = true;
  document.getElementById('btn-stigma').disabled = true;

  const box = document.getElementById('reveal-box');
  const label = document.getElementById('reveal-label');
  const text = document.getElementById('reveal-text');
  if (q.answer === 'fact') {
    box.className = 'reveal-box reveal-fact';
    label.className = 'reveal-label fact';
    label.textContent = 'FACT — This is true.';
  } else {
    box.className = 'reveal-box reveal-stigma';
    label.className = 'reveal-label stigma';
    label.textContent = 'STIGMA — This is a harmful misconception.';
  }
  text.textContent = q.reveal;
  document.getElementById('reveal-stat').textContent = '📊 The data: ' + q.stat;
  document.getElementById('advocacy-note').textContent = '📋 Advocacy connection: ' + q.advocacy;

  const isLast = current >= QUESTIONS.length - 1;
  document.getElementById('next-btn').textContent = isLast ? 'See My Score →' : 'Next Statement →';

  announce((correct ? 'Correct! ' : 'Incorrect. ') + 'The answer is ' + q.answer + '. ' + q.reveal);
  go('s-reveal');
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showScore();
  } else {
    loadQuestion();
    go('s-question');
  }
}

function showScore() {
  const pct = Math.round(score / QUESTIONS.length * 100);
  document.getElementById('final-score').textContent = score + ' / ' + QUESTIONS.length;
  let msg = '';
  if (pct >= 90) msg = 'Outstanding! You can distinguish evidence from stigma with precision. That clarity will make you a stronger health policy advocate.';
  else if (pct >= 70) msg = 'Strong work. A few misconceptions remain — review the data reveals and bring those facts into your advocacy letter.';
  else if (pct >= 50) msg = 'Good effort. Stigma is deeply embedded in our culture — recognizing it is the first step to fighting it.';
  else msg = 'This content is hard precisely because stigma looks like common sense. Review the reveals and discuss with your team — you have important work ahead.';
  document.getElementById('score-msg').textContent = msg;
  announce('Game complete. You scored ' + score + ' out of ' + QUESTIONS.length + '. ' + msg);
  go('s-score');
}

function restartGame() {
  current = 0; score = 0; voted = false;
  loadQuestion();
  go('s-question');
}
</script>
</body>
</html>
