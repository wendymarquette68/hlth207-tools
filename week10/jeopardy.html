<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTC Jeopardy — HLTH 207</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a1a}
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;padding:10px 16px;background:#0F5558;color:white;border-radius:8px;font-size:15px;font-weight:700;z-index:9999;text-decoration:none}
.screen{display:none;min-height:100vh;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#s-setup{max-width:420px;margin:0 auto;padding:2rem 1.5rem}
.logo-box{width:56px;height:56px;background:#0F5558;border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.setup-title{text-align:center;margin-bottom:1.75rem}
.setup-title h1{font-size:24px;font-weight:700;color:#0F5558;margin-bottom:4px}
.setup-title p{font-size:14px;color:#444}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:6px}
.field input{width:100%;padding:13px 15px;border:2px solid #bbb;border-radius:10px;font-size:16px;background:white;color:#1a1a1a;outline:none}
.field input:focus{border-color:#0F5558;box-shadow:0 0 0 3px rgba(15,85,88,.2)}
.hint{text-align:center;font-size:12px;color:#555;margin-top:.75rem}
.btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.98);opacity:.85}
.btn:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
.btn-primary{background:#0F5558;color:white;margin-bottom:.5rem}
/* Score bar — verified contrasts */
#scorebar{background:#0F5558;padding:12px 16px;display:flex;gap:4px}
.team-score{flex:1;text-align:center}
.team-score .tname{font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
.team-score .tname.active-team{color:#FFD700;font-weight:700}
.team-score .tscore{font-size:22px;font-weight:700;color:#FFD700}
/* FFD700 on #0F5558: luminance of FFD700 = 0.7219, #0F5558 = 0.0257. Ratio = (0.7219+.05)/(0.0257+.05) = 9.84:1 ✓ AAA */
#turnbar{background:#2C3E50;padding:8px 16px;text-align:center;font-size:13px;color:#FFD700;font-weight:600}
#game-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px;background:#e5e7eb}
.cat-header{border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 4px;min-height:54px;font-size:11px;font-weight:700;color:white;line-height:1.3;text-transform:uppercase;letter-spacing:.03em}
.q-cell{border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:56px;font-size:18px;font-weight:700;color:#6B4700;background:rgba(107,71,0,.1);border:2px solid rgba(107,71,0,.35);cursor:pointer;transition:transform .1s}
/* #6B4700 on rgba(107,71,0,.1)≈#F5EDD8: contrast = (0.172+.05)/(0.176+.05) ≈ use #4A2D00 for safety */
.q-cell{color:#4A2D00}
.q-cell:active{transform:scale(.96)}
.q-cell.done{background:#f4f6f7;border-color:#ccc;color:#999;cursor:default;font-size:20px}
.q-cell:not(.done):hover{background:rgba(107,71,0,.18)}
.q-cell:focus-visible{outline:3px solid #1a1a1a;outline-offset:2px}
#board-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 12px 10px}
#progress{font-size:12px;color:#444}
.end-btn-small{border:2px solid #bbb;background:white;color:#444;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
.end-btn-small:focus-visible{outline:3px solid #1a1a1a;outline-offset:2px}
#s-question .q-header{padding:22px 20px 18px;text-align:center}
.q-cat-label{font-size:12px;color:rgba(255,255,255,.85);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.q-value{font-size:40px;font-weight:800;color:#FFD700}
.q-body{padding:20px}
.clue-text{font-size:18px;line-height:1.7;margin-bottom:2rem;color:#1a1a1a}
#s-answer .a-header{padding:16px 20px;text-align:center}
.clue-recap{background:#f8f9fa;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid #ccc}
.clue-recap .recap-label{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:5px}
.clue-recap p{font-size:13px;color:#1a1a1a;line-height:1.5}
.answer-box{border-radius:10px;padding:14px;margin-bottom:18px;border:2px solid #0F5558;background:#e8f4f5}
.answer-box .ans-label{font-size:11px;color:#0A3A3C;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px}
.answer-box .ans-text{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.5}
.score-prompt{font-size:13px;color:#333;margin-bottom:10px;font-weight:600}
.score-row{display:flex;gap:6px;margin-bottom:6px}
.btn-correct{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:#155724;color:white}
.btn-wrong{padding:14px 16px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:#7A1515;color:white}
.btn-correct:focus-visible,.btn-wrong:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
.btn-ghost{background:white;color:#1a1a1a;border:2px solid #bbb;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;width:100%;font-family:inherit;margin-top:.5rem}
.btn-ghost:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
#s-end{max-width:400px;margin:0 auto;padding:2.5rem 1.5rem;text-align:center}
.trophy-box{width:64px;height:64px;background:#6B4700;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center}
.final-card{background:white;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #ccc}
.final-card.winner{border:2px solid #0F5558}
.final-rank{font-size:13px;color:#555;font-weight:500}
.final-name{font-size:15px;font-weight:600;color:#1a1a1a}
.final-score{font-size:18px;font-weight:700;color:#0F5558}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div role="status" aria-live="polite" aria-atomic="true" id="live-msg" style="position:absolute;left:-9999px;height:1px;width:1px;overflow:hidden"></div>
<div role="alert" aria-live="assertive" aria-atomic="true" id="live-alert" style="position:absolute;left:-9999px;height:1px;width:1px;overflow:hidden"></div>

<main id="s-setup" class="screen active" aria-labelledby="setup-heading">
  <a id="main-content" tabindex="-1" aria-hidden="true" style="display:block;height:0"></a>
  <div style="padding-top:2.5rem"></div>
  <div class="logo-box" aria-hidden="true">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M8 21h8M12 17v4M17 8a5 5 0 0 1-10 0V3H4v5a8 8 0 0 0 16 0V3h-3v5z"/></svg>
  </div>
  <div class="setup-title">
    <h1 id="setup-heading">LTC Jeopardy</h1>
    <p>HLTH 207 — Long-Term Care Edition</p>
  </div>
  <div class="field">
    <label for="t1">Team 1 name</label>
    <input type="text" id="t1" value="Team 1" maxlength="20" autocomplete="off">
  </div>
  <div class="field">
    <label for="t2">Team 2 name</label>
    <input type="text" id="t2" value="Team 2" maxlength="20" autocomplete="off">
  </div>
  <div style="margin-top:1.5rem">
    <button class="btn btn-primary" onclick="startGame()">Start Game</button>
  </div>
  <p class="hint">Pass the device between teams on each turn</p>
</main>

<main id="s-board" class="screen" aria-labelledby="turnbar">
  <div id="scorebar" role="region" aria-label="Team scores" aria-live="polite"></div>
  <div id="turnbar" role="status" aria-live="polite"></div>
  <div id="game-grid" role="grid" aria-label="Jeopardy game board"></div>
  <div id="board-footer">
    <span id="progress" role="status" aria-live="polite"></span>
    <button class="end-btn-small" onclick="showEnd()">End game early</button>
  </div>
</main>

<main id="s-question" class="screen" aria-labelledby="q-live-heading">
  <div class="q-header" id="qheader">
    <div class="q-cat-label" id="qcat"></div>
    <div class="q-value" id="qval" aria-hidden="true"></div>
    <h1 id="q-live-heading" style="position:absolute;left:-9999px"></h1>
  </div>
  <div class="q-body">
    <p class="clue-text" id="qclue"></p>
    <button class="btn btn-primary" onclick="showAnswer()">Reveal Answer</button>
    <button class="btn-ghost" onclick="skipQ()">Skip — no one answers</button>
  </div>
</main>

<main id="s-answer" class="screen" aria-labelledby="answer-heading">
  <div class="a-header" id="aheader">
    <div class="q-cat-label" id="acat"></div>
    <div class="q-value" id="aval" aria-hidden="true"></div>
  </div>
  <div style="padding:16px 20px">
    <h2 id="answer-heading" style="font-size:16px;margin-bottom:10px;color:#1a1a1a">Answer and scoring</h2>
    <div class="clue-recap">
      <div class="recap-label">The clue</div>
      <p id="aclue"></p>
    </div>
    <div class="answer-box">
      <div class="ans-label">Correct Answer</div>
      <div class="ans-text" id="aans"></div>
    </div>
    <p class="score-prompt" id="score-prompt">Award or deduct points:</p>
    <div id="teambtns" role="group" aria-labelledby="score-prompt"></div>
    <button class="btn-ghost" onclick="noScore()">No one scored — next question</button>
  </div>
</main>

<main id="s-end" class="screen" aria-labelledby="end-heading">
  <div class="trophy-box" aria-hidden="true">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M17 8a5 5 0 0 1-10 0V3H4v5a8 8 0 0 0 16 0V3h-3v5z"/></svg>
  </div>
  <h1 id="end-heading" style="font-size:26px;font-weight:700;margin-bottom:.35rem">Game Over</h1>
  <p id="wintext" style="color:#444;margin-bottom:1.5rem;font-size:15px"></p>
  <div id="finalscores" style="margin-bottom:1.5rem" role="region" aria-label="Final scores"></div>
  <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
</main>

<script>
const CATS=["Care Settings","Who Pays?","Key Terms","Political Moment","True or False?"];
const CAT_COLORS=["#0F5558","#2C3E50","#155724","#7A1515","#4A235A"];
const VALS=[100,200,300,400,500];
const Q=[
  [{v:100,c:"This is the LEAST restrictive LTC setting — skilled nursing, therapy, and personal assistance delivered in the patient's own home.",a:"What is home health care?"},
   {v:200,c:"This daytime community-based program serves TWO populations at once: the care recipient who gets health monitoring and activities, AND the family caregiver who gets a break during the day.",a:"What is adult day services?"},
   {v:300,c:"This type of facility is for individuals who need ADL assistance but do NOT require 24-hour skilled nursing — residents have their own private room or apartment.",a:"What is an assisted living facility (ALF)?"},
   {v:400,c:"This Medicare and Medicaid-funded program manages ALL medical and LTC needs for SNF-eligible individuals who choose to stay in the community. Its prototype — meaning 'peaceful and happy abode' in Cantonese — opened in San Francisco in 1972.",a:"What is PACE (Programs of All-Inclusive Care for the Elderly)?"},
   {v:500,c:"This is the ONLY healthcare provider category whose Medicare certification requires that at least 5% of all patient care hours be contributed by volunteers.",a:"What is hospice?"}],
  [{v:100,c:"This government program is the PRIMARY payer for long-term care in the United States, covering 61% of all LTC spending in 2023.",a:"What is Medicaid?"},
   {v:200,c:"Medicare covers skilled nursing facility care for up to this many days — but ONLY following a qualifying hospital stay of at least 3 consecutive days.",a:"What is 100 days?"},
   {v:300,c:"The 2024 national MEDIAN monthly cost for an assisted living facility — a figure that more than half of Americans significantly underestimate.",a:"What is $5,350 per month?"},
   {v:400,c:"The estimated annual market value of unpaid care provided by family members and friends — nearly DOUBLE the combined expenditures for nursing homes and formal home care.",a:"What is more than $470 billion per year?"},
   {v:500,c:"To qualify for Medicaid LTC coverage, individuals must reduce their countable assets to this threshold — triggering the 'spend-down' process that can wipe out a lifetime of savings.",a:"What is $2,000?"}],
  [{v:100,c:"The six fundamental self-care tasks — bathing, dressing, toileting, transferring, maintaining continence, and eating — that define functional independence and determine LTC need.",a:"What are Activities of Daily Living (ADLs)?"},
   {v:200,c:"This 1999 Supreme Court decision upheld the right of citizens with disabilities to receive care in the community rather than in institutions — the legal foundation of 'aging in place' as a civil right.",a:"What is the Olmstead Decision?"},
   {v:300,c:"Coined in the 1980s, this term describes neighborhoods or apartment complexes where residents have aged in place organically over time — not because anyone planned a senior community.",a:"What is a Naturally Occurring Retirement Community (NORC)?"},
   {v:400,c:"This type of care provides temporary surrogate care to a patient when their primary family caregiver must be absent — designed to prevent caregiver burnout and delay institutionalization.",a:"What is respite care?"},
   {v:500,c:"The 1987 federal law that established the nursing home Resident Bill of Rights, restricted physical and chemical restraints, mandated quality assurance standards, and set training requirements for nursing home aides.",a:"What is OBRA (Omnibus Budget Reconciliation Act)?"}],
  [{v:100,c:"Signed into law on July 4th, 2025, this legislation — known by its informal patriotic nickname — represents the LARGEST single cut to Medicaid in the program's 60-year history.",a:"What is the One Big Beautiful Bill Act?"},
   {v:200,c:"The approximate total Medicaid reduction over 10 years in the 2025 Budget Reconciliation Act — projected to cause 15 million Americans to lose health insurance.",a:"What is $940 billion?"},
   {v:300,c:"The number of years that federal nursing home minimum staffing standards — including an RN on-site 24/7 — were blocked from implementation by the 2025 law.",a:"What is 10 years?"},
   {v:400,c:"Experts estimate that blocking the minimum nursing home staffing rule will result in approximately this many PREVENTABLE DEATHS per year among nursing home residents.",a:"What is 13,000?"},
   {v:500,c:"These Medicaid-funded services — home health aides, personal care, adult day, PACE — are classified as 'optional' under federal Medicaid law, making them the FIRST to be cut when states face funding shortfalls.",a:"What are Home and Community-Based Services (HCBS)?"}],
  [{v:100,c:"TRUE or FALSE: Medicare is the primary payer for nursing home care in the United States.",a:"FALSE — Medicaid is the primary payer, covering 61% of all LTC spending. Four in ten Americans get this wrong!"},
   {v:200,c:"TRUE or FALSE: 70% of people turning 65 today will need some form of long-term care before they die.",a:"TRUE — And nearly 1 in 5 will face lifetime LTC costs exceeding $200,000."},
   {v:300,c:"TRUE or FALSE: The average assisted living facility costs less than $4,000 per month nationally.",a:"FALSE — The 2024 national median is $5,350 per month. More than half of Americans underestimate this."},
   {v:400,c:"TRUE or FALSE: PACE participants — all certified as nursing-home-eligible — mostly end up in nursing homes anyway.",a:"FALSE — Only 6% of early PACE participants required nursing home placement. The rest stayed in their communities."},
   {v:500,c:"TRUE or FALSE: Only about 3 to 4% of Americans age 50 and older carry private long-term care insurance.",a:"TRUE — The private LTC insurance market has largely failed: premiums skyrocketed and many companies exited."}]
];

let teams=[{n:"Team 1",s:0},{n:"Team 2",s:0}];
let done=new Set(),curQ=null,curTeam=0;

function announce(msg,urgent=false){
  const el=document.getElementById(urgent?'live-alert':'live-msg');
  el.textContent='';
  setTimeout(()=>{el.textContent=msg;},60);
}

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const scr=document.getElementById(id);
  scr.classList.add('active');
  window.scrollTo(0,0);
  setTimeout(()=>{
    const h=scr.querySelector('h1,h2,button,[id="main-content"]');
    if(h){h.setAttribute('tabindex','-1');h.focus();}
  },120);
}

function startGame(){
  const n1=document.getElementById('t1').value.trim()||'Team 1';
  const n2=document.getElementById('t2').value.trim()||'Team 2';
  teams=[{n:n1,s:0},{n:n2,s:0}];
  done=new Set();curQ=null;curTeam=0;
  buildBoard();updateBar();go('s-board');
  announce('Game started. '+n1+' versus '+n2+'. '+n1+' goes first.');
}

function buildBoard(){
  const g=document.getElementById('game-grid');
  g.innerHTML='';
  CATS.forEach((cat,ci)=>{
    const el=document.createElement('div');
    el.className='cat-header';
    el.style.background=CAT_COLORS[ci];
    el.textContent=cat;
    el.setAttribute('role','columnheader');
    el.setAttribute('aria-label','Category: '+cat);
    g.appendChild(el);
  });
  VALS.forEach((val,vi)=>{
    CATS.forEach((cat,ci)=>{
      const key=ci+'-'+vi;
      const isDone=done.has(key);
      const el=document.createElement('button');
      el.className='q-cell'+(isDone?' done':'');
      el.textContent=isDone?'✓':'$'+val;
      el.setAttribute('aria-label',isDone?cat+' $'+val+', already answered':cat+' for $'+val);
      if(isDone){el.setAttribute('aria-disabled','true');el.disabled=true;}
      else{el.onclick=()=>openQ(ci,vi);}
      g.appendChild(el);
    });
  });
  document.getElementById('progress').textContent=done.size+' of 25 answered';
}

function openQ(ci,vi){
  curQ={ci,vi,key:ci+'-'+vi};
  const q=Q[ci][vi];
  document.getElementById('qheader').style.background=CAT_COLORS[ci];
  document.getElementById('qcat').textContent=CATS[ci];
  document.getElementById('qval').textContent='$'+q.v;
  document.getElementById('qclue').textContent=q.c;
  document.getElementById('q-live-heading').textContent=CATS[ci]+' for $'+q.v+': '+q.c;
  go('s-question');
  announce(CATS[ci]+' for $'+q.v+'. '+q.c);
}

function showAnswer(){
  const {ci,vi}=curQ;
  const q=Q[ci][vi];
  document.getElementById('aheader').style.background=CAT_COLORS[ci];
  document.getElementById('acat').textContent=CATS[ci];
  document.getElementById('aval').textContent='$'+q.v;
  document.getElementById('aclue').textContent=q.c;
  document.getElementById('aans').textContent=q.a;
  const btns=document.getElementById('teambtns');
  btns.innerHTML='';
  teams.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='score-row';
    const cor=document.createElement('button');
    cor.className='btn-correct';
    cor.textContent=t.n+' — Correct: +$'+q.v;
    cor.setAttribute('aria-label',t.n+' answered correctly. Award $'+q.v+'.');
    cor.onclick=()=>award(i,true);
    const wr=document.createElement('button');
    wr.className='btn-wrong';
    wr.textContent='Wrong: −$'+q.v;
    wr.setAttribute('aria-label',t.n+' answered incorrectly. Deduct $'+q.v+'.');
    wr.onclick=()=>award(i,false);
    row.appendChild(cor);row.appendChild(wr);btns.appendChild(row);
  });
  go('s-answer');
  announce('Correct answer: '+q.a);
}

function award(ti,correct){
  const q=Q[curQ.ci][curQ.vi];
  teams[ti].s+=correct?q.v:-q.v;
  announce(teams[ti].n+(correct?' gains':' loses')+' $'+q.v+'. New score: $'+teams[ti].s.toLocaleString()+'.',true);
  finish();
}
function noScore(){finish();}
function skipQ(){go('s-board');buildBoard();updateBar();}

function finish(){
  done.add(curQ.key);
  curTeam=(curTeam+1)%teams.length;
  curQ=null;
  if(done.size>=25){showEnd();return;}
  buildBoard();updateBar();go('s-board');
}

function updateBar(){
  document.getElementById('scorebar').innerHTML=teams.map((t,i)=>'<div class="team-score"><div class="tname'+(i===curTeam?' active-team':'')+'">'+(i===curTeam?'Your turn: ':'')+t.n+'</div><div class="tscore">$'+t.s.toLocaleString()+'</div></div>').join('');
  document.getElementById('turnbar').textContent=teams[curTeam].n+"'s turn — pick a question";
  announce(teams[curTeam].n+"'s turn.");
}

function showEnd(){
  const sorted=[...teams].sort((a,b)=>b.s-a.s);
  const tied=sorted[0].s===sorted[1].s;
  document.getElementById('wintext').textContent=tied?'It\'s a tie!':'Winner: '+sorted[0].n+' with $'+sorted[0].s.toLocaleString()+'!';
  document.getElementById('finalscores').innerHTML=sorted.map((t,i)=>'<div class="final-card'+(i===0&&!tied?' winner':'')+'"><div><div class="final-rank">'+['1st Place','2nd Place'][i]+'</div><div class="final-name">'+t.n+'</div></div><div class="final-score">$'+t.s.toLocaleString()+'</div></div>').join('');
  go('s-end');
  announce(tied?'Game over — it is a tie!':'Game over! Winner is '+sorted[0].n+' with $'+sorted[0].s.toLocaleString()+'.',true);
}

function resetGame(){
  teams=[{n:'Team 1',s:0},{n:'Team 2',s:0}];
  done=new Set();curQ=null;curTeam=0;
  document.getElementById('t1').value='Team 1';
  document.getElementById('t2').value='Team 2';
  go('s-setup');
}
</script>
</body>
</html>
