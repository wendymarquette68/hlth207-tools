<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 9: Behavioral Health Services — HLTH 207 Presenter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --purple:     #4A235A;
  --purple-mid: #6B3580;
  --teal:       #006D77;
  --teal-light: #83C5BE;
  --gold:       #E8A838;
  --red:        #7A1515;
  --green:      #155724;
  --cream:      #F8F4FF;
  --slate:      #2C3E50;
  --white:      #FFFFFF;
  --dark:       #12071A;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark)}
body{font-family:'DM Sans',sans-serif}

/* ── SLIDE CONTAINER ── */
#deck{width:100vw;height:100vh;position:relative}
.slide{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  opacity:0;transition:opacity .35s ease;
}
.slide.active{display:flex;opacity:1}

/* ── NAVIGATION ── */
#nav{
  position:fixed;bottom:20px;right:24px;
  display:flex;align-items:center;gap:10px;z-index:100;
}
.nav-btn{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);
  color:white;padding:10px 20px;border-radius:50px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  backdrop-filter:blur(8px);transition:background .15s;
}
.nav-btn:hover{background:rgba(255,255,255,.22)}
#slide-counter{font-size:12px;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;min-width:48px;text-align:center}

/* ── INSTRUCTOR CUE BAR ── */
.cue-bar{
  position:fixed;top:0;left:0;right:0;
  background:rgba(232,168,56,.95);color:#1a0a00;
  padding:8px 20px;font-size:12px;font-weight:700;
  text-align:center;z-index:200;
  display:none;letter-spacing:.04em;text-transform:uppercase;
  backdrop-filter:blur(4px);
}
.cue-bar.visible{display:block}

/* ── PROGRESS BAR ── */
#progress{
  position:fixed;bottom:0;left:0;height:3px;
  background:var(--teal-light);transition:width .3s ease;z-index:100;
}

/* ══════════════════════════════════════════
   SLIDE LAYOUTS
══════════════════════════════════════════ */

/* TITLE slide */
.s-title{
  background:var(--dark);
  justify-content:center;align-items:flex-start;padding:80px 10%;
  position:relative;overflow:hidden;min-height:100vh;
}
.s-title::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%, rgba(74,35,90,.7) 0%, transparent 65%),
             radial-gradient(ellipse at 20% 80%, rgba(0,109,119,.4) 0%, transparent 55%);
}
.s-title .chapter-tag{
  font-size:11px;color:var(--teal-light);font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:18px;
  position:relative;z-index:1;
}
.s-title h1{
  font-family:'Playfair Display',serif;font-size:clamp(42px,6vw,72px);
  color:var(--white);line-height:1.1;margin-bottom:20px;
  position:relative;z-index:1;max-width:700px;
}
.s-title .subtitle{
  font-size:18px;color:rgba(255,255,255,.6);font-weight:300;
  position:relative;z-index:1;margin-bottom:40px;
}
.s-title .meta{
  font-size:13px;color:rgba(255,255,255,.35);
  position:relative;z-index:1;letter-spacing:.05em;
}
.title-orb{
  position:absolute;right:8%;top:50%;transform:translateY(-50%);
  width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, var(--purple-mid), var(--dark));
  border:1px solid rgba(131,197,190,.2);z-index:1;
  display:flex;align-items:center;justify-content:center;
  font-size:120px;
}

/* SECTION HEADER slide */
.s-section{
  background:var(--purple);justify-content:center;align-items:center;
  text-align:center;padding:60px;position:relative;overflow:hidden;
}
.s-section::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(0,109,119,.35) 0%, transparent 70%);
}
.s-section .section-num{
  font-size:11px;color:var(--teal-light);font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;
  position:relative;z-index:1;
}
.s-section h2{
  font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,60px);
  color:var(--white);line-height:1.15;position:relative;z-index:1;
  max-width:700px;
}

/* CONTENT slide */
.s-content{
  background:var(--cream);flex-direction:column;
}
.slide-header{
  background:var(--purple);padding:22px 48px;flex-shrink:0;
}
.slide-header h2{
  font-family:'Playfair Display',serif;font-size:28px;color:var(--white);
}
.slide-body{
  flex:1;padding:32px 48px;display:flex;flex-direction:column;
  justify-content:flex-start;gap:14px;overflow:hidden;
}

/* DARK CONTENT slide */
.s-dark{background:var(--dark)}
.s-dark .slide-header{background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1)}
.s-dark .slide-header h2{color:var(--white)}
.s-dark .slide-body{padding:32px 48px;gap:14px}

/* ── REVEAL ITEMS ── */
.reveal-item{
  opacity:0;transform:translateY(12px);
  transition:opacity .4s ease, transform .4s ease;
  pointer-events:none;
}
.reveal-item.shown{opacity:1;transform:none;pointer-events:auto}

/* ── CONTENT COMPONENTS ── */

/* Stat card */
.stat-card{
  background:var(--purple);border-radius:14px;
  padding:20px 24px;display:flex;align-items:center;gap:20px;
}
.stat-num{
  font-family:'Playfair Display',serif;font-size:52px;
  color:var(--gold);line-height:1;flex-shrink:0;
}
.stat-label{font-size:16px;color:rgba(255,255,255,.85);line-height:1.5}

/* Two col stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Bullet point */
.bullet-row{
  display:flex;gap:14px;align-items:flex-start;
  background:white;border-radius:10px;padding:14px 18px;
  border-left:4px solid var(--teal);
}
.bullet-dot{
  width:28px;height:28px;border-radius:50%;background:var(--teal);
  color:white;font-size:12px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.bullet-text{font-size:17px;color:var(--slate);line-height:1.6}

/* Dark bullet */
.bullet-dark{
  background:rgba(255,255,255,.07);border-left-color:var(--teal-light);
}
.bullet-dark .bullet-text{color:rgba(255,255,255,.88)}
.bullet-dark .bullet-dot{background:var(--teal)}

/* Promise/Reality columns */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1}
.col-block{border-radius:12px;overflow:hidden}
.col-head{
  padding:12px 18px;font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;color:white;
}
.col-head.green{background:var(--green)}
.col-head.red{background:var(--red)}
.col-items{background:white;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.col-item{font-size:15px;color:var(--slate);line-height:1.5;padding-left:14px;border-left:3px solid #ddd}

/* Timeline */
.timeline{display:flex;gap:0;align-items:stretch;flex:1}
.t-item{flex:1;display:flex;flex-direction:column;position:relative}
.t-item:not(:last-child)::after{
  content:'→';position:absolute;right:-12px;top:38px;
  font-size:18px;color:var(--teal);z-index:2;
}
.t-year{
  background:var(--teal);color:white;font-size:13px;font-weight:700;
  padding:6px 10px;border-radius:6px 6px 0 0;text-align:center;
}
.t-name{
  background:var(--purple);color:white;font-size:13px;font-weight:600;
  padding:6px 10px;text-align:center;
}
.t-body{
  background:white;padding:10px;font-size:13px;color:var(--slate);
  line-height:1.5;flex:1;border-radius:0 0 6px 6px;
}

/* Myth/Fact rows */
.myth-row{
  display:grid;grid-template-columns:80px 1fr;gap:0;
  border-radius:10px;overflow:hidden;
}
.myth-tag{
  background:var(--red);color:white;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:10px 8px;letter-spacing:.05em;
}
.myth-content{background:rgba(255,255,255,.06);padding:14px 18px}
.myth-label{font-size:12px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:4px;font-weight:600}
.myth-text{font-size:15px;color:rgba(255,255,255,.9);line-height:1.5}

/* Sector card */
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sector-card{border-radius:10px;overflow:hidden}
.sector-head{padding:10px 14px;font-size:14px;font-weight:700;color:white}
.sector-body{background:white;padding:12px 14px;font-size:14px;color:var(--slate);line-height:1.5}

/* Barrier cards */
.barrier-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.barrier-card{border-radius:10px;overflow:hidden;background:white}
.barrier-head{padding:10px 16px;font-size:14px;font-weight:700;color:white}
.barrier-body{padding:12px 16px;font-size:14px;color:var(--slate);line-height:1.6}

/* Definition box */
.def-box{
  background:white;border-radius:12px;padding:20px 24px;
  border-left:5px solid var(--purple);
}
.def-term{font-size:14px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.def-text{font-size:17px;color:var(--slate);line-height:1.7}

/* Quote */
.quote-box{
  background:var(--purple);border-radius:14px;padding:24px 28px;
  position:relative;
}
.quote-mark{font-size:60px;color:var(--gold);line-height:1;font-family:'Playfair Display',serif;position:absolute;top:8px;left:18px;opacity:.6}
.quote-text{font-size:17px;color:rgba(255,255,255,.92);line-height:1.75;font-style:italic;padding-left:20px;margin-top:12px}
.quote-src{font-size:13px;color:var(--teal-light);margin-top:10px;text-align:right;font-weight:600}

/* Law table rows */
.law-row{display:grid;grid-template-columns:70px 180px 1fr;gap:0;border-radius:8px;overflow:hidden}
.law-year{background:var(--teal);color:white;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:10px 6px;text-align:center}
.law-name{background:rgba(74,35,90,.9);color:white;font-size:14px;font-weight:600;padding:10px 12px;display:flex;align-items:center}
.law-impact{background:white;padding:10px 14px;font-size:14px;color:var(--slate);line-height:1.5;display:flex;align-items:center}

/* 988 callout */
.crisis-grid{display:grid;grid-template-columns:1fr 200px 1fr;gap:20px;align-items:center;flex:1}
.crisis-orb{
  width:180px;height:180px;border-radius:50%;background:var(--teal);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto;
}
.crisis-num{font-family:'Playfair Display',serif;font-size:64px;color:white;line-height:1}
.crisis-sub{font-size:13px;color:rgba(255,255,255,.8);text-align:center;margin-top:4px;font-weight:600}

/* ACTION SLIDE */
.s-action{background:var(--dark);justify-content:center;align-items:center;text-align:center;padding:60px;position:relative;overflow:hidden}
.s-action::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%, rgba(0,109,119,.4) 0%, transparent 65%)}
.action-icon{font-size:64px;margin-bottom:20px;position:relative;z-index:1}
.action-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,52px);color:white;margin-bottom:12px;position:relative;z-index:1}
.action-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:36px;font-style:italic;position:relative;z-index:1}
.action-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--teal);color:white;padding:16px 32px;
  border-radius:50px;font-size:16px;font-weight:700;
  text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:transform .1s,background .15s;position:relative;z-index:1;
}
.action-btn:hover{background:#00858F;transform:scale(1.03)}
.action-url{
  margin-top:16px;font-size:12px;color:rgba(255,255,255,.4);
  position:relative;z-index:1;
}

/* FILM CUE slide */
.s-film{background:#0a0a0a;justify-content:center;align-items:center;text-align:center;padding:60px;position:relative;overflow:hidden}
.s-film::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(232,168,56,.15) 0%, transparent 65%)}
.film-icon{font-size:80px;margin-bottom:20px;position:relative;z-index:1}
.film-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);color:var(--gold);margin-bottom:8px;position:relative;z-index:1}
.film-detail{font-size:18px;color:rgba(255,255,255,.7);margin-bottom:6px;position:relative;z-index:1}
.film-time{font-size:14px;color:rgba(255,255,255,.4);position:relative;z-index:1;margin-bottom:32px}
.film-instructions{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:18px 28px;max-width:500px;
  font-size:14px;color:rgba(255,255,255,.75);line-height:1.7;
  position:relative;z-index:1;
}

/* TAKEAWAYS slide */
.takeaway-item{
  display:flex;gap:16px;align-items:flex-start;
  background:rgba(255,255,255,.05);border-radius:10px;
  padding:14px 18px;border-left:3px solid var(--teal);
}
.takeaway-num{
  width:28px;height:28px;border-radius:50%;background:var(--teal);
  color:white;font-size:12px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.takeaway-text{font-size:15px;color:rgba(255,255,255,.88);line-height:1.6}

/* Recovery principles */
.recovery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1}
.recovery-card{
  background:white;border-radius:12px;padding:18px 14px;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;
  border-top:4px solid var(--teal);
}
.recovery-icon{font-size:32px}
.recovery-title{font-size:13px;color:var(--teal);font-weight:700}
.recovery-text{font-size:11px;color:var(--slate);line-height:1.5}

/* Settings grid */
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.setting-card{background:white;border-radius:10px;overflow:hidden}
.setting-head{background:var(--teal);padding:10px 14px;font-size:12px;font-weight:700;color:white;text-align:center}
.setting-body{padding:12px 14px;font-size:12px;color:var(--slate);line-height:1.5}

/* Parity box */
.parity-main{background:var(--teal);border-radius:12px;padding:18px 22px;margin-bottom:14px}
.parity-title{font-size:16px;color:white;font-weight:700;margin-bottom:6px}
.parity-text{font-size:15px;color:rgba(255,255,255,.88);line-height:1.6}
.parity-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.parity-card{background:white;border-radius:10px;padding:14px 16px}
.parity-card-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.parity-card-text{font-size:14px;color:var(--slate);line-height:1.55}

/* Keyboard hint */
#hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.25);font-family:'DM Sans',sans-serif;pointer-events:none;transition:opacity .5s;letter-spacing:.06em}
</style>
</head>

        <div class="parity-text">Requires that insurance coverage for mental health and substance use disorder treatment be <strong>no more restrictive</strong> than coverage for medical and surgical care. Dollar limits, treatment limitations, and network standards must be equal.</div>
      </div>

        <div class="reveal-item parity-card">
          <div class="parity-card-title" style="color:var(--green)">✓ What It Does</div>
          <div class="parity-card-text">Prohibits stricter annual or lifetime dollar limits on mental health benefits. Requires equal treatment limitations and equal network access standards compared to medical and surgical coverage.</div>
        </div>
        <div class="reveal-item parity-card">
          <div class="parity-card-title" style="color:var(--red)">✗ Where It Fails</div>
          <div class="parity-card-text">
            <strong>Carve-outs:</strong> Insurers outsource mental health benefits to a separate managed care organization, creating a parallel and often inferior system.<br><br>
            <strong>NQTLs — Nonquantitative Treatment Limitations:</strong> These are insurance restrictions that are not dollar limits but still block access. Examples include requiring prior authorization before seeing a therapist, making patients try cheaper treatments before approving the one their doctor recommends (step therapy), and designing provider networks so narrow that no in-network behavioral health providers are available nearby. Insurers can use NQTLs to effectively deny mental health care even when dollar limits are technically equal.<br><br>
            <strong>Network adequacy:</strong> Parity does not require that enough in-network providers actually exist.
          </div>

// ══════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════
let current = 0;
let revealIndex = 0;

function buildSlides() {
  const deck = document.getElementById('deck');
  SLIDES.forEach((s, i) => {
    const div = document.createElement('div');
    div.innerHTML = s.html;
    const inner = div.firstElementChild;
    inner.dataset.index = i;
    deck.appendChild(inner);
  });
}

function getSlideEl(i) {
  return document.querySelector(`[data-index="${i}"]`);
}

function getRevealItems(i) {
  return getSlideEl(i).querySelectorAll('.reveal-item');
}

function showSlide(i, resetReveal = true) {
  document.querySelectorAll('.slide.active').forEach(s => s.classList.remove('active'));
  getSlideEl(i).classList.add('active');
  if (resetReveal) {
    revealIndex = 0;
    getRevealItems(i).forEach(el => el.classList.remove('shown'));
  }
  updateUI(i);
  window.scrollTo(0, 0);
}

function updateUI(i) {
  // Counter
  document.getElementById('slide-counter').textContent = `${i + 1} / ${SLIDES.length}`;
  // Progress
  document.getElementById('progress').style.width = `${((i + 1) / SLIDES.length) * 100}%`;
  // Cue bar
  const cue = document.getElementById('cue');
  if (SLIDES[i].cue) {
    cue.textContent = SLIDES[i].cue;
    cue.classList.add('visible');
  } else {
    cue.classList.remove('visible');
  }
  // Hide hint after first advance
  if (i > 0) document.getElementById('hint').style.opacity = '0';
}

function next() {
  const items = getRevealItems(current);
  if (revealIndex < items.length) {
    items[revealIndex].classList.add('shown');
    revealIndex++;
  } else if (current < SLIDES.length - 1) {
    current++;
    showSlide(current);
  }
}

function prev() {
  if (current > 0) {
    current--;
    // Show all reveals on previous slide
    showSlide(current, true);
    const items = getRevealItems(current);
    items.forEach(el => el.classList.add('shown'));
    revealIndex = items.length;
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
});

// Click anywhere on slide (but not on nav buttons or links)
document.getElementById('deck').addEventListener('click', e => {
  if (e.target.closest('a') || e.target.closest('button')) return;
  next();
});

buildSlides();
showSlide(0);
</script>
