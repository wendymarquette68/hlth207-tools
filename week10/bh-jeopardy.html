<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behavioral Health Jeopardy — HLTH 207</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a1a}
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;padding:10px 16px;background:#4A235A;color:white;border-radius:8px;font-size:15px;font-weight:700;z-index:9999;text-decoration:none}
.screen{display:none;min-height:100vh;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#s-setup{max-width:420px;margin:0 auto;padding:2rem 1.5rem}
.logo-box{width:56px;height:56px;background:#4A235A;border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:26px}
.setup-title{text-align:center;margin-bottom:1.75rem}
.setup-title h1{font-size:24px;font-weight:700;color:#4A235A;margin-bottom:4px}
.setup-title p{font-size:14px;color:#444}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:6px}
.field input{width:100%;padding:13px 15px;border:2px solid #bbb;border-radius:10px;font-size:16px;background:white;color:#1a1a1a;outline:none}
.field input:focus{border-color:#4A235A}
.btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.98);opacity:.85}
.btn:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
.btn-primary{background:#4A235A;color:white;margin-bottom:.5rem}
#scorebar{background:#4A235A;padding:12px 16px;display:flex;gap:4px}
.team-score{flex:1;text-align:center}
.team-score .tname{font-size:12px;color:rgba(255,255,255,.75);font-weight:500}
.team-score .tname.active-team{color:#FFD700;font-weight:700}
.team-score .tscore{font-size:22px;font-weight:700;color:#FFD700}
#turnbar{background:#2C3E50;padding:8px 16px;text-align:center;font-size:13px;color:#FFD700;font-weight:600}
#game-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px;background:#e5e7eb}
.cat-header{border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 4px;min-height:54px;font-size:10px;font-weight:700;color:white;line-height:1.3;text-transform:uppercase;letter-spacing:.03em}
.q-cell{border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:56px;font-size:17px;font-weight:700;color:#4A235A;background:rgba(74,35,90,.1);border:1.5px solid rgba(74,35,90,.35);cursor:pointer;transition:transform .1s}
.q-cell:active{transform:scale(.96)}
.q-cell.done{background:#f4f6f7;border-color:#e0e0e0;color:#ccc;cursor:default}
.q-cell:not(.done):hover{background:rgba(74,35,90,.18)}
.q-cell:focus-visible{outline:3px solid #1a1a1a;outline-offset:2px}
#board-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 12px 10px}
#progress{font-size:12px;color:#555}
.end-btn-small{border:2px solid #bbb;background:white;color:#555;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
.q-header{padding:22px 20px 18px;text-align:center}
.q-cat-label{font-size:12px;color:rgba(255,255,255,.85);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.q-value{font-size:40px;font-weight:800;color:#FFD700}
.q-body{padding:20px}
.clue-text{font-size:18px;line-height:1.7;margin-bottom:2rem;color:#1a1a1a}
.clue-recap{background:#f8f9fa;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid #ccc}
.clue-recap .recap-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:5px}
.clue-recap p{font-size:13px;color:#1a1a1a;line-height:1.5}
.answer-box{border-radius:10px;padding:14px;margin-bottom:18px;border:2px solid #4A235A;background:#EEE8F8}
.answer-box .ans-label{font-size:11px;color:#4A235A;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px}
.answer-box .ans-text{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.5}
.score-prompt{font-size:13px;color:#333;margin-bottom:10px;font-weight:600}
.score-row{display:flex;gap:6px;margin-bottom:6px}
.btn-correct{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:#155724;color:white}
.btn-wrong{padding:14px 16px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:#7A1515;color:white}
.btn-correct:focus-visible,.btn-wrong:focus-visible{outline:3px solid #1a1a1a;outline-offset:3px}
.btn-ghost{background:white;color:#1a1a1a;border:2px solid #bbb;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;width:100%;font-family:inherit;margin-top:.5rem}
#s-end{max-width:400px;margin:0 auto;padding:2.5rem 1.5rem;text-align:center}
.trophy-box{width:64px;height:64px;background:#4A235A;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:28px}
.final-card{background:white;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #ccc}
.final-card.winner{border:2px solid #4A235A}
.final-rank{font-size:13px;color:#555;font-weight:500}
.final-name{font-size:15px;font-weight:600;color:#1a1a1a}
.final-score{font-size:18px;font-weight:700;color:#4A235A}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div role="status" aria-live="polite" aria-atomic="true" id="live-msg" style="position:absolute;left:-9999px;height:1px;width:1px;overflow:hidden"></div>
<div role="alert" aria-live="assertive" aria-atomic="true" id="live-alert" style="position:absolute;left:-9999px;height:1px;width:1px;overflow:hidden"></div>

<main id="s-setup" class="screen active" aria-labelledby="setup-heading">
  <a id="main-content" tabindex="-1" aria-hidden="true" style="display:block;height:0"></a>
  <div style="padding-top:2.5rem"></div>
  <div class="logo-box" aria-hidden="true">🧠</div>
  <div class="setup-title">
    <h1 id="setup-heading">Behavioral Health Jeopardy</h1>
    <p>HLTH 207 — Chapter 9 Edition</p>
  </div>
  <div class="field">
    <label for="t1">Team 1 name</label>
    <input type="text" id="t1" value="Team 1" maxlength="20" autocomplete="off">
  </div>
  <div class="field">
    <label for="t2">Team 2 name</label>
    <input type="text" id="t2" value="Team 2" maxlength="20" autocomplete="off">
  </div>
  <div style="margin-top:1.5rem">
    <button class="btn btn-primary" onclick="startGame()">Start Game</button>
  </div>
  <p style="text-align:center;font-size:12px;color:#777;margin-top:.75rem">Pass the device between teams on each turn</p>
</main>

<main id="s-board" class="screen" aria-labelledby="turnbar">
  <div id="scorebar" role="region" aria-label="Team scores" aria-live="polite"></div>
  <div id="turnbar" role="status" aria-live="polite"></div>
  <div id="game-grid" role="grid" aria-label="Jeopardy game board"></div>
  <div id="board-footer">
    <span id="progress" role="status" aria-live="polite"></span>
    <button class="end-btn-small" onclick="showEnd()">End game early</button>
  </div>
</main>

<main id="s-question" class="screen" aria-labelledby="q-live-heading">
  <div class="q-header" id="qheader">
    <div class="q-cat-label" id="qcat"></div>
    <div class="q-value" id="qval" aria-hidden="true"></div>
    <h2 id="q-live-heading" style="position:absolute;left:-9999px"></h2>
  </div>
  <div class="q-body">
    <p class="clue-text" id="qclue"></p>
    <button class="btn btn-primary" onclick="showAnswer()">Reveal Answer</button>
    <button class="btn-ghost" onclick="skipQ()">Skip — no one answers</button>
  </div>
</main>

<main id="s-answer" class="screen" aria-labelledby="answer-heading">
  <div class="q-header" id="aheader">
    <div class="q-cat-label" id="acat"></div>
    <div class="q-value" id="aval" aria-hidden="true"></div>
  </div>
  <div style="padding:16px 20px">
    <h2 id="answer-heading" style="font-size:16px;margin-bottom:10px;color:#1a1a1a">Answer and scoring</h2>
    <div class="clue-recap"><div class="recap-label">The clue</div><p id="aclue"></p></div>
    <div class="answer-box"><div class="ans-label">Correct Answer</div><div class="ans-text" id="aans"></div></div>
    <p class="score-prompt" id="score-prompt">Award or deduct points:</p>
    <div id="teambtns" role="group" aria-labelledby="score-prompt"></div>
    <button class="btn-ghost" onclick="noScore()">No one scored — next question</button>
  </div>
</main>

<main id="s-end" class="screen" aria-labelledby="end-heading">
  <div class="trophy-box" aria-hidden="true">🏆</div>
  <h1 id="end-heading" style="font-size:26px;font-weight:700;margin-bottom:.35rem">Game Over</h1>
  <p id="wintext" style="color:#444;margin-bottom:1.5rem;font-size:15px"></p>
  <div id="finalscores" style="margin-bottom:1.5rem" role="region" aria-label="Final scores"></div>
  <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
</main>

<script>
const CATS = ["History & Deinstitutionalization","Who Gets Care","Barriers to Access","Financing & Parity","True or False?"];
const CAT_COLORS = ["#4A235A","#2C3E50","#7A1515","#155724","#0F5558"];
const VALS = [100,200,300,400,500];

const Q = [
// History & Deinstitutionalization
[{v:100,c:"In the early 19th century, this religious group established the first freestanding asylum in Philadelphia where people with mental illness could receive humane treatment.",a:"Who are the Quakers?"},
{v:200,c:"By the mid-1950s, the public psychiatric hospital population in the United States peaked at more than this number of people — before declining dramatically.",a:"What is half a million (500,000)?"},
{v:300,c:"This 1963 federal law funded the development of community mental health centers, launching the era of community-based psychiatric care and accelerating deinstitutionalization.",a:"What is the Community Mental Health Act of 1963?"},
{v:400,c:"The movement of severely mentally ill patients out of state hospitals and into community settings during the 1960s–1980s. It was supposed to be accompanied by robust community care — which largely failed to materialize.",a:"What is deinstitutionalization?"},
{v:500,c:"This paradigm shift in behavioral health care, underway since 2004, moves from a 'problem-based' diagnosis-anchored model to a 'strength-based,' self-directed, consumer-centered approach to recovery.",a:"What is the Recovery Movement (or Recovery-Oriented Systems of Care — ROSC)?"}],
// Who Gets Care
[{v:100,c:"In 2024, approximately this percentage of U.S. adults — about 62 million people — experienced any mental illness in the past year.",a:"What is 23% (or approximately 1 in 4)?"},
{v:200,c:"This subgroup of people with mental illness, estimated at 14.6 million adults in 2024, has 'serious functional impairment which substantially interferes with or limits one or more major life activities.'",a:"What is serious mental illness (SMI)?"},
{v:300,c:"Neuropsychiatric disorders are the leading cause of disability in the United States as measured by these units — calculated by adding years of life lost to premature death plus years lived with disability.",a:"What are Disability-Adjusted Life Years (DALYs)?"},
{v:400,c:"According to 2024 data, this age group of U.S. adults — between 18 and 25 — has the HIGHEST rate of mental illness at 32.2%, more than any other age group.",a:"What are young adults ages 18–25?"},
{v:500,c:"This term describes the coexistence of two or more diagnoses in one person — for example, a mental health condition and a substance use disorder occurring simultaneously. NIMH reports nearly half of those with any psychiatric disorder meet criteria for two or more conditions.",a:"What is comorbidity?"}],
// Barriers to Access
[{v:100,c:"This is the national average wait time for behavioral health services in the United States as of 2025 — meaning people seeking mental health care wait this long for an appointment.",a:"What is 48 days?"},
{v:200,c:"In 2024, this proportion — nearly half — of the 62 million U.S. adults with mental illness received NO treatment for their condition.",a:"What is 48% (or nearly half)?"},
{v:300,c:"This term describes the process by which insurers outsource coverage and management of mental health and substance use disorder benefits to a separate managed care organization — creating a parallel and often inferior benefit structure.",a:"What are carve-outs?"},
{v:400,c:"65% of nonmetropolitan counties in the United States completely lack this type of specialist, meaning that rural Americans face nearly double the access barriers of urban residents for behavioral health care.",a:"What are psychiatrists?"},
{v:500,c:"This population — estimated at 250,000 to 400,000 people — represents the largest untreated psychiatric population in the United States, where jails and prisons have effectively become the de facto mental health system.",a:"What are the homeless mentally ill (and/or incarcerated people with mental illness)?"}],
// Financing & Parity
[{v:100,c:"This landmark 2008 federal law — named for two senators who championed it — requires that insurance coverage for mental health and substance use disorder treatment be no more restrictive than coverage for medical and surgical care.",a:"What is the Wellstone-Domenici Mental Health Parity and Addiction Equity Act (MHPAEA)?"},
{v:200,c:"These insurance plan restrictions — including prior authorization requirements, step therapy protocols, and network design limits — are used by insurers to restrict behavioral health access in ways that may violate parity law, even when dollar limits are equal.",a:"What are Nonquantitative Treatment Limitations (NQTLs)?"},
{v:300,c:"With a set amount paid for the care of a defined patient population regardless of how much service is actually provided, this payment method was used by insurers to control behavioral health costs — often by rationing care.",a:"What is capitation?"},
{v:400,c:"The condition that existed for decades in behavioral health insurance — before the 2008 Parity Act — in which coverage limits for mental health treatment were more restrictive than those for physical illness, treating psychiatric care as categorically different.",a:"What is non-parity?"},
{v:500,c:"These federally certified clinics, funded through Medicaid, provide comprehensive behavioral health services — including mental health, substance use, and primary care — to underserved communities and must meet specific quality and access standards.",a:"What are Certified Community Behavioral Health Clinics (CCBHCs)?"}],
// True or False
[{v:100,c:"TRUE or FALSE: People with mental illness are significantly more dangerous and violent than people without mental illness.",a:"FALSE — People with serious mental illness are 10 times more likely to be VICTIMS of violent crime than perpetrators. Only 3–5% of violent acts are attributable to serious mental illness."},
{v:200,c:"TRUE or FALSE: The United States has enough behavioral health providers to meet current demand for mental health services.",a:"FALSE — Over one-third of the U.S. population lives in mental health professional shortage areas. HRSA projects a 49% increase in demand for mental health services by 2033, while supply will grow only 11%."},
{v:300,c:"TRUE or FALSE: The Affordable Care Act (2010) improved access to behavioral health services by reducing the number of uninsured Americans and reinforcing insurance parity.",a:"TRUE — The ACA decreased the uninsured population from 44.8 million in 2013 to 28.8 million by 2018, enabling more people to seek behavioral health care and supporting the parity framework."},
{v:400,c:"TRUE or FALSE: Deinstitutionalization successfully transitioned people with serious mental illness from state hospitals to well-supported community mental health care.",a:"FALSE — Community mental health resources were never adequately funded. The result was widespread homelessness and incarceration. 67% of unhoused people in the U.S. have a mental illness; 64% of jail inmates met criteria for mental illness at time of booking."},
{v:500,c:"TRUE or FALSE: 17.6% of U.S. Veterans experienced a mental illness in 2023 — a rate significantly higher than the 5.6% of the general adult population who had serious mental illness in 2024.",a:"TRUE — Veterans are disproportionately affected by PTSD, depression, and substance use disorders due to combat exposure, moral injury, and transition challenges. The VHA operates one of the largest behavioral health systems in the country specifically to address this elevated need."}],
];

let teams = [{n:"Team 1",s:0},{n:"Team 2",s:0}];
let done = new Set(), curQ = null, curTeam = 0;

function announce(msg,urgent=false){const el=document.getElementById(urgent?'live-alert':'live-msg');el.textContent='';setTimeout(()=>{el.textContent=msg;},60);}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const scr=document.getElementById(id);scr.classList.add('active');window.scrollTo(0,0);setTimeout(()=>{const h=scr.querySelector('h1,h2,button,[id="main-content"]');if(h){h.setAttribute('tabindex','-1');h.focus();}},120);}

function startGame(){
  const n1=document.getElementById('t1').value.trim()||'Team 1';
  const n2=document.getElementById('t2').value.trim()||'Team 2';
  teams=[{n:n1,s:0},{n:n2,s:0}];
  done=new Set();curQ=null;curTeam=0;
  buildBoard();updateBar();go('s-board');
  announce('Game started. '+n1+' versus '+n2+'. '+n1+' goes first.');
}

function buildBoard(){
  const g=document.getElementById('game-grid');
  g.innerHTML='';
  CATS.forEach((cat,ci)=>{
    const el=document.createElement('div');
    el.className='cat-header';
    el.style.background=CAT_COLORS[ci];
    el.textContent=cat;
    el.setAttribute('role','columnheader');
    el.setAttribute('aria-label','Category: '+cat);
    g.appendChild(el);
  });
  VALS.forEach((val,vi)=>{
    CATS.forEach((cat,ci)=>{
      const key=ci+'-'+vi;
      const isDone=done.has(key);
      const el=document.createElement('button');
      el.className='q-cell'+(isDone?' done':'');
      el.textContent=isDone?'✓':'$'+val;
      el.setAttribute('aria-label',isDone?cat+' $'+val+', already answered':cat+' for $'+val);
      if(isDone){el.setAttribute('aria-disabled','true');el.disabled=true;}
      else{el.onclick=()=>openQ(ci,vi);}
      g.appendChild(el);
    });
  });
  document.getElementById('progress').textContent=done.size+' of 25 answered';
}

function openQ(ci,vi){
  curQ={ci,vi,key:ci+'-'+vi};
  const q=Q[ci][vi];
  document.getElementById('qheader').style.background=CAT_COLORS[ci];
  document.getElementById('qcat').textContent=CATS[ci];
  document.getElementById('qval').textContent='$'+q.v;
  document.getElementById('qclue').textContent=q.c;
  document.getElementById('q-live-heading').textContent=CATS[ci]+' for $'+q.v+': '+q.c;
  go('s-question');
  announce(CATS[ci]+' for $'+q.v+'. '+q.c);
}

function showAnswer(){
  const {ci,vi}=curQ;const q=Q[ci][vi];
  document.getElementById('aheader').style.background=CAT_COLORS[ci];
  document.getElementById('acat').textContent=CATS[ci];
  document.getElementById('aval').textContent='$'+q.v;
  document.getElementById('aclue').textContent=q.c;
  document.getElementById('aans').textContent=q.a;
  const btns=document.getElementById('teambtns');
  btns.innerHTML='';
  teams.forEach((t,i)=>{
    const row=document.createElement('div');row.className='score-row';
    const cor=document.createElement('button');cor.className='btn-correct';
    cor.textContent=t.n+' — Correct: +$'+q.v;
    cor.setAttribute('aria-label',t.n+' answered correctly. Award $'+q.v+'.');
    cor.onclick=()=>award(i,true);
    const wr=document.createElement('button');wr.className='btn-wrong';
    wr.textContent='Wrong: −$'+q.v;
    wr.setAttribute('aria-label',t.n+' answered incorrectly. Deduct $'+q.v+'.');
    wr.onclick=()=>award(i,false);
    row.appendChild(cor);row.appendChild(wr);btns.appendChild(row);
  });
  go('s-answer');
  announce('Correct answer: '+q.a);
}

function award(ti,correct){
  const q=Q[curQ.ci][curQ.vi];
  teams[ti].s+=correct?q.v:-q.v;
  announce(teams[ti].n+(correct?' gains':' loses')+' $'+q.v+'. New score: $'+teams[ti].s.toLocaleString()+'.',true);
  finish();
}
function noScore(){finish();}
function skipQ(){go('s-board');buildBoard();updateBar();}
function finish(){done.add(curQ.key);curTeam=(curTeam+1)%teams.length;curQ=null;if(done.size>=25){showEnd();return;}buildBoard();updateBar();go('s-board');}
function updateBar(){document.getElementById('scorebar').innerHTML=teams.map((t,i)=>'<div class="team-score"><div class="tname'+(i===curTeam?' active-team':'')+'">'+t.n+'</div><div class="tscore">$'+t.s.toLocaleString()+'</div></div>').join('');document.getElementById('turnbar').textContent=teams[curTeam].n+"'s turn — pick a question";announce(teams[curTeam].n+"'s turn.");}
function showEnd(){
  const sorted=[...teams].sort((a,b)=>b.s-a.s);const tied=sorted[0].s===sorted[1].s;
  document.getElementById('wintext').textContent=tied?'It\'s a tie!':'Winner: '+sorted[0].n+' with $'+sorted[0].s.toLocaleString()+'!';
  document.getElementById('finalscores').innerHTML=sorted.map((t,i)=>'<div class="final-card'+(i===0&&!tied?' winner':'')+'"><div><div class="final-rank">'+['1st Place','2nd Place'][i]+'</div><div class="final-name">'+t.n+'</div></div><div class="final-score">$'+t.s.toLocaleString()+'</div></div>').join('');
  go('s-end');
  announce(tied?'Game over — it is a tie!':'Game over! Winner is '+sorted[0].n+'.',true);
}
function resetGame(){teams=[{n:'Team 1',s:0},{n:'Team 2',s:0}];done=new Set();curQ=null;curTeam=0;document.getElementById('t1').value='Team 1';document.getElementById('t2').value='Team 2';go('s-setup');}
</script>
</body>
</html>
